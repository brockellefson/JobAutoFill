<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JobAutoFill</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>JobAutoFill</h1>
    <span class="hint">Saved locally to your Chrome profile</span>
  </header>

  <form id="profile-form">
    <section>
      <h2>Basics</h2>
      <div class="row">
        <label>First name<input name="first_name" type="text" autocomplete="given-name" /></label>
        <label>Last name<input name="last_name" type="text" autocomplete="family-name" /></label>
      </div>
      <label>Preferred first name<input name="preferred_first_name" type="text" /></label>
      <label>Email<input name="email" type="email" autocomplete="email" /></label>
      <label>Phone<input name="phone" type="tel" autocomplete="tel" placeholder="+1 415 555 0100" /></label>
      <label>Location / City<input name="location" type="text" placeholder="San Francisco, CA" /></label>
      <label>Country<input name="country" type="text" placeholder="United States" /></label>
      <label>Pronouns<input name="pronouns" type="text" placeholder="he/him, she/her, they/them" /></label>
    </section>

    <section>
      <h2>Links</h2>
      <label>LinkedIn<input name="linkedin" type="url" placeholder="https://linkedin.com/in/you" /></label>
      <label>GitHub<input name="github" type="url" placeholder="https://github.com/you" /></label>
      <label>Portfolio / Website<input name="website" type="url" placeholder="https://yoursite.com" /></label>
      <label>Other website<input name="other_website" type="url" /></label>
    </section>

    <section>
      <h2>Work / experience</h2>
      <label>Current (or most recent) company
        <input name="current_company" type="text" placeholder="Acme Inc." />
      </label>
      <label>Current (or most recent) job title
        <input name="current_title" type="text" placeholder="Software Engineer" />
      </label>
      <label>Authorized to work in country applied to?
        <select name="work_authorized">
          <option value="">—</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </label>
      <label>Require visa sponsorship now or in the future?
        <select name="needs_sponsorship">
          <option value="">—</option>
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </label>
      <label>Years of professional experience
        <input name="years_experience" type="text" placeholder="e.g. 5 or 8" />
      </label>
    </section>

    <section>
      <h2>Demographics (voluntary self-ID)</h2>
      <label>Gender
        <select name="gender">
          <option value="">—</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Non-binary">Non-binary</option>
          <option value="Decline to self-identify">Decline to self-identify</option>
        </select>
      </label>
      <label>Hispanic / Latino?
        <select name="hispanic_ethnicity">
          <option value="">—</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
          <option value="Decline to self-identify">Decline to self-identify</option>
        </select>
      </label>
      <label>Race / Ethnicity
        <select name="race">
          <option value="">—</option>
          <option value="American Indian or Alaska Native">American Indian or Alaska Native</option>
          <option value="Asian">Asian</option>
          <option value="Black or African American">Black or African American</option>
          <option value="Hispanic or Latino">Hispanic or Latino</option>
          <option value="Native Hawaiian or Other Pacific Islander">Native Hawaiian or Other Pacific Islander</option>
          <option value="Two or More Races">Two or More Races</option>
          <option value="White">White</option>
          <option value="Decline to self-identify">Decline to self-identify</option>
        </select>
      </label>
      <label>Veteran status
        <select name="veteran_status">
          <option value="">—</option>
          <option value="I am not a protected veteran">I am not a protected veteran</option>
          <option value="I identify as one or more of the classifications of protected veteran">I identify as one or more of the classifications of protected veteran</option>
          <option value="I don't wish to answer">I don't wish to answer</option>
        </select>
      </label>
      <label>Disability status
        <select name="disability_status">
          <option value="">—</option>
          <option value="No, I do not have a disability and have not had one in the past">No, I do not have a disability and have not had one in the past</option>
          <option value="Yes, I have a disability, or have had one in the past">Yes, I have a disability, or have had one in the past</option>
          <option value="I do not want to answer">I do not want to answer</option>
        </select>
      </label>
    </section>

    <section>
      <h2>Notes (optional)</h2>
      <label>"Why do you want to join this company?" default answer
        <textarea name="why_company" rows="4" placeholder="Will be filled when the form asks why you want to join. You can edit on the page afterward."></textarea>
      </label>
      <label>Additional information
        <textarea name="additional_info" rows="2"></textarea>
      </label>
    </section>

    <div class="actions">
      <button type="button" id="save-btn">Save</button>
      <span id="status"></span>
    </div>
  </form>

  <script src="popup.js"></script>
</body>
</html>
