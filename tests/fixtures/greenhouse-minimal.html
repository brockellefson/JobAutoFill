<!--
  Minimal Greenhouse-shape application form.
  Real Greenhouse has more chrome and custom questions; this fixture covers
  the field shapes the native + radio fillers should handle.
-->
<head><title>Apply</title></head>
<body>
  <form id="application_form">
    <div>
      <label for="first_name">First Name *</label>
      <input id="first_name" name="first_name" type="text" />
    </div>
    <div>
      <label for="last_name">Last Name *</label>
      <input id="last_name" name="last_name" type="text" />
    </div>
    <div>
      <label for="email">Email *</label>
      <input id="email" name="email" type="email" />
    </div>
    <div>
      <label for="phone">Phone *</label>
      <input id="phone" name="phone" type="tel" />
    </div>
    <div>
      <label for="linkedin">LinkedIn Profile</label>
      <input id="linkedin" name="linkedin" type="url" />
    </div>
    <div>
      <label for="github">GitHub URL</label>
      <input id="github" name="github" type="url" />
    </div>
    <div>
      <label for="website">Website</label>
      <input id="website" name="website" type="url" />
    </div>

    <fieldset>
      <legend>Are you legally authorized to work in the United States?</legend>
      <label><input type="radio" name="q_work_auth" value="yes" /> Yes</label>
      <label><input type="radio" name="q_work_auth" value="no" /> No</label>
    </fieldset>

    <fieldset>
      <legend>Will you now or in the future require sponsorship?</legend>
      <label><input type="radio" name="q_sponsorship" value="yes" /> Yes</label>
      <label><input type="radio" name="q_sponsorship" value="no" /> No</label>
    </fieldset>

    <div>
      <label for="why">Why do you want to join us?</label>
      <textarea id="why" name="why"></textarea>
    </div>
  </form>
</body>
